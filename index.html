<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>С днём рождения, Амина 💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 30%, #14001f, #05000a);
      font-family: 'Orbitron', sans-serif;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: block;
    }

    #starsCanvas { z-index: 1; }
    #heartsCanvas { z-index: 2; }
    #sakuraCanvas { z-index: 3; }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      width: 90%;
      max-width: 800px;
      padding: 20px;
      background: rgba(10, 0, 20, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      border: 2px solid rgba(168, 85, 247, 0.5);
      box-shadow: 0 0 50px rgba(168, 85, 247, 0.5);
    }

    .photo-frame {
      width: 140px;
      height: 140px;
      margin: 0 auto 20px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(145deg, #a855f7, #e879f9);
      box-shadow: 0 0 40px #c084fc;
      animation: float 4s infinite alternate;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #fff;
      display: block;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-10px); }
    }

    .title {
      font-size: clamp(32px, 10vw, 60px);
      font-weight: 900;
      background: linear-gradient(135deg, #f0abfc, #a855f7, #e879f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #c084fc, 0 0 60px #a855f7;
      animation: neonPulse 2s infinite alternate ease-in-out;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    @keyframes neonPulse {
      0% { text-shadow: 0 0 30px #a855f7, 0 0 50px #e879f9; }
      100% { text-shadow: 0 0 70px #e879f9, 0 0 100px #a855f7; }
    }

    .intro, .text {
      font-size: clamp(18px, 5vw, 26px);
      background: linear-gradient(135deg, #e9d5ff, #fae8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px #d8b4fe;
      min-height: 3.5em;
      margin: 15px 0;
      font-weight: 700;
    }

    .glitch {
      display: inline-block;
      animation: glitch 0.15s infinite alternate;
    }

    @keyframes glitch {
      0% { transform: translate(0); filter: hue-rotate(0deg); }
      20% { transform: translate(-2px, 1px); filter: hue-rotate(10deg); }
      40% { transform: translate(2px, -1px); filter: hue-rotate(-10deg); }
      60% { transform: translate(-1px, 2px); }
      80% { transform: translate(1px, -2px); }
      100% { transform: translate(0); }
    }

    /* Контролы */
    .controls {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .music-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      color: #f5d0fe;
      text-shadow: 0 0 10px #a855f7;
      cursor: pointer;
    }

    .music-toggle input {
      width: 20px;
      height: 20px;
      accent-color: #e879f9;
      cursor: pointer;
    }

    .btn {
      padding: 14px 40px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(45deg, #9333ea, #e879f9, #c084fc);
      background-size: 200% 200%;
      color: white;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 0 30px #9333ea;
      transition: transform 0.3s, box-shadow 0.3s;
      animation: gradientShift 3s infinite alternate;
      border: 2px solid rgba(255,255,255,0.5);
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 50px #e879f9;
    }

    .btn.hidden {
      display: none;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .final {
      font-size: clamp(22px, 6vw, 32px);
      margin-top: 30px;
      background: linear-gradient(135deg, #f5d0fe, #f0abfc, #e879f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #e879f9;
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 2s, transform 2s;
    }

    .final.show {
      opacity: 1;
      transform: scale(1);
    }

    /* Адаптация */
    @media (max-width: 480px) {
      .photo-frame {
        width: 100px;
        height: 100px;
      }
    }
  </style>
</head>
<body>

<!-- Холсты -->
<canvas id="starsCanvas"></canvas>
<canvas id="heartsCanvas"></canvas>
<canvas id="sakuraCanvas"></canvas>

<div class="container" id="main">
  <!-- Фото (можно заменить ссылку) -->
  <div class="photo-frame">
    <img src="https://via.placeholder.com/200/6a0dad/ffffff?text=💜" alt="Амина" id="profilePhoto">
  </div>

  <div class="title">С Днём Рождения, Амина 💜</div>
  <div class="intro" id="intro"></div>
  <div class="text" id="text"></div>
  <div class="final" id="final"></div>

  <!-- Блок управления -->
  <div class="controls">
    <label class="music-toggle">
      <input type="checkbox" id="musicToggle" checked> 🎵 Включить музыку
    </label>
    <button class="btn" id="startBtn">Запустить магию ✨</button>
  </div>
</div>

<!-- Аудио с вашим треком roi.mp3 -->
<audio id="music" loop preload="auto">
  <source src="roi.mp3" type="audio/mpeg">
  <!-- Запасной вариант на случай отсутствия файла -->
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

<script>
  (function() {
    // ========== Элементы ==========
    const introEl = document.getElementById('intro');
    const textEl = document.getElementById('text');
    const finalEl = document.getElementById('final');
    const music = document.getElementById('music');
    const startBtn = document.getElementById('startBtn');
    const musicToggle = document.getElementById('musicToggle');
    const photo = document.getElementById('profilePhoto');

    // ========== Тексты (длинное поздравление) ==========
    const introMessages = [
      "Загрузка...",
      "Подгрузка данных из космоса...",
      "Сбой загрузки данных..."
      "Перезагрузка...",
      "Космический канал открыт...",
      "Передача тепла...",
      "Оп,работаем"
    ];

    const mainMessages = [
      "Амина...",
      "Сегодня твой день ✨",
      "Ты — свет в этой вселенной",
      "Твоя улыбка ярче звёзд",
      "Добрая и нежная",
      "Ты делаешь мир лучше",
      "Спасибо, за всю помощь которую ты оказывала мне",
      "Я очень тебя ценю",
      "Родная, прости за весь мой тупизм,",
      "С днём рождения, родная 💜"
    ];

    // ========== Оптимизация под устройство ==========
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const STAR_COUNT = isMobile ? 120 : 200;
    const MAX_HEARTS = 70;        // максимум сердечек на экране
    const HEARTS_PER_BURST = 40;  // сколько добавлять за взрыв
    const PETAL_COUNT = isMobile ? 60 : 120;

    // ========== Утилиты ==========
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Замедленная печать: 180 мс на символ → ~3 секунды на строку из 16 символов
    async function typeLine(text, element, glitch = false) {
      element.innerHTML = '';
      for (let i = 0; i < text.length; i++) {
        if (glitch && Math.random() < 0.15) {
          element.innerHTML += `<span class="glitch">${text[i]}</span>`;
        } else {
          element.innerHTML += text[i];
        }
        await sleep(80); // 180 мс между символами
      }
    }

    // ========== Холсты и частицы ==========
    const starsCanvas = document.getElementById('starsCanvas');
    const heartsCanvas = document.getElementById('heartsCanvas');
    const sakuraCanvas = document.getElementById('sakuraCanvas');

    let stars = [];
    let hearts = [];
    let petals = [];

    // Создание звёзд
    function createStars(count) {
      const w = starsCanvas.width;
      const h = starsCanvas.height;
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * w,
          y: Math.random() * h,
          radius: Math.random() * 2.5 + 0.5,
          alpha: Math.random() * 0.8 + 0.2,
          speed: Math.random() * 0.02 + 0.005,
          dir: Math.random() > 0.5 ? 1 : -1
        });
      }
    }

    // Подгон размеров
    function resizeCanvases() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      starsCanvas.width = w;
      starsCanvas.height = h;
      heartsCanvas.width = w;
      heartsCanvas.height = h;
      sakuraCanvas.width = w;
      sakuraCanvas.height = h;

      createStars(STAR_COUNT);
    }

    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();

    // ========== Отрисовка ==========
    function drawStars() {
      const ctx = starsCanvas.getContext('2d');
      ctx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
      
      stars.forEach(s => {
        s.alpha += s.speed * s.dir;
        if (s.alpha >= 1 || s.alpha <= 0.2) s.dir *= -1;
        
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, 2 * Math.PI);
        ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
        ctx.shadowColor = '#c084fc';
        ctx.shadowBlur = 10;
        ctx.fill();
      });
      ctx.shadowBlur = 0;
    }

    function drawHearts() {
      const ctx = heartsCanvas.getContext('2d');
      ctx.clearRect(0, 0, heartsCanvas.width, heartsCanvas.height);
      
      ctx.font = '26px "Segoe UI", "Arial Unicode MS", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      hearts = hearts.filter(h => {
        h.x += h.dx;
        h.y += h.dy;
        h.life -= 1;
        
        if (h.life <= 0 || h.y < -50 || h.y > heartsCanvas.height + 50 || h.x < -50 || h.x > heartsCanvas.width + 50) {
          return false;
        }
        
        ctx.fillStyle = `rgba(200, 130, 255, ${Math.min(1, h.life / 100)})`;
        ctx.fillText('💜', h.x, h.y);
        return true;
      });
    }

    function drawPetals() {
      const ctx = sakuraCanvas.getContext('2d');
      ctx.clearRect(0, 0, sakuraCanvas.width, sakuraCanvas.height);
      
      petals.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.rotation += 0.01;
        
        if (p.y > sakuraCanvas.height + 30) {
          p.y = -20;
          p.x = Math.random() * sakuraCanvas.width;
        }
        if (p.x < -30 || p.x > sakuraCanvas.width + 30) {
          p.x = Math.random() * sakuraCanvas.width;
          p.y = -20;
        }
        
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.beginPath();
        ctx.ellipse(0, 0, p.sizeX, p.sizeY, 0, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(230, 180, 210, 0.8)';
        ctx.shadowColor = '#e879f9';
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.restore();
      });
      ctx.shadowBlur = 0;
    }

    // ========== Анимационный цикл ==========
    function animate() {
      drawStars();
      drawHearts();
      drawPetals();
      requestAnimationFrame(animate);
    }
    animate();

    // ========== Взрывы частиц (с ограничением) ==========
    function explodeHearts() {
      const w = heartsCanvas.width;
      const h = heartsCanvas.height;
      
      if (hearts.length >= MAX_HEARTS) return;
      
      const count = Math.min(HEARTS_PER_BURST, MAX_HEARTS - hearts.length);
      for (let i = 0; i < count; i++) {
        hearts.push({
          x: w / 2,
          y: h / 2,
          dx: (Math.random() - 0.5) * 6,
          dy: (Math.random() - 0.5) * 6 - 2,
          life: 120 + Math.random() * 80
        });
      }
    }

    function explodeSakura() {
      const w = sakuraCanvas.width;
      const h = sakuraCanvas.height;
      
      if (petals.length > PETAL_COUNT * 1.2) return;
      
      for (let i = 0; i < PETAL_COUNT; i++) {
        petals.push({
          x: Math.random() * w,
          y: Math.random() * h,
          dx: (Math.random() - 0.5) * 1.2,
          dy: Math.random() * 1.2 + 0.6,
          sizeX: Math.random() * 7 + 4,
          sizeY: Math.random() * 5 + 2,
          rotation: Math.random() * Math.PI * 2
        });
      }
    }

    // ========== Обработка клика с учётом выбора музыки ==========
    startBtn.addEventListener('click', async () => {
      startBtn.classList.add('hidden');
      musicToggle.parentElement.style.display = 'none'; // скрываем чекбокс
      
      // Включаем музыку только если чекбокс отмечен
      if (musicToggle.checked) {
        music.play().catch(e => console.log('Не удалось воспроизвести музыку (возможно, нет файла roi.mp3)'));
      }
      
      // Интро
      for (let msg of introMessages) {
        await typeLine(msg, introEl, true);
        await sleep(800);
        introEl.innerHTML = '';
      }
      
      // Основные сообщения
      for (let msg of mainMessages) {
        await typeLine(msg, textEl, false);
        await sleep(1000);
        textEl.innerHTML = '';
      }
      
      // Финальное сообщение
      finalEl.textContent = 'Всегда сияй роднулька!) 💜';
      finalEl.classList.add('show');
      
      // Взрывы
      explodeHearts();
      explodeSakura();
    });

    // Заглушка для фото
    photo.onerror = function() {
      this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="%23a855f7"><circle cx="50" cy="50" r="50"/><text x="50" y="70" font-size="50" text-anchor="middle" fill="white">💜</text></svg>';
    };
  })();
</script>
</body>
</html>
